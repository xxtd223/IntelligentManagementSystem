<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:sans-serif; }
    #map-container { width:100%; height:calc(100% - 126px); }
    #info-bar { padding:10px 14px; background:#fff; border-top:1px solid #eee; font-size:13px; }
    #address-text { color:#333; line-height:1.5; min-height:20px; }
    #coord-text { color:#888; font-size:12px; margin-top:2px; }
    #confirm-btn {
      display:block; width:calc(100% - 24px); margin:8px 12px;
      background:#2979FF; color:#fff; border:none; padding:12px;
      border-radius:10px; font-size:15px; font-weight:600; cursor:pointer;
      box-shadow:0 4px 12px rgba(41,121,255,.4);
    }
    #confirm-btn:active { opacity:.8; }
    #error-msg { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:#fff; padding:20px 24px; border-radius:12px; text-align:center; color:#f44336; font-size:14px; }
  </style>
</head>
<body>
  <div id="map-container"></div>
  <div id="info-bar">
    <div id="address-text">点击地图或拖动标记选择位置</div>
    <div id="coord-text"></div>
  </div>
  <button id="confirm-btn" onclick="confirmSel()">确认选择此位置</button>
  <div id="error-msg"></div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var initLat = parseFloat(params.get('lat') || '39.909187');
    var initLng = parseFloat(params.get('lng') || '116.397451');
    var key = params.get('key') || '';
    var securityCode = params.get('securityCode') || '';
    var selLat = initLat, selLng = initLng, selAddr = '';

    // 高德 JS API 2.0 安全模式：若有安全码则提前注入
    if (securityCode) {
      window._AMapSecurityConfig = { securityJsCode: securityCode };
    }

    // 动态加载高德地图 JS API（Web 端，v2.0）
    var script = document.createElement('script');
    script.src = 'https://webapi.amap.com/maps?v=2.0&key=' + key + '&plugin=AMap.Geocoder';
    script.onload = initMap;
    script.onerror = function () {
      var el = document.getElementById('error-msg');
      el.style.display = 'block';
      el.innerText = '地图加载失败，请检查 API Key 或网络连接。';
    };
    document.head.appendChild(script);

    function initMap() {
      var map = new AMap.Map('map-container', { zoom: 16, center: [initLng, initLat] });
      var geocoder = new AMap.Geocoder({ radius: 300 });
      var marker = new AMap.Marker({
        position: [initLng, initLat],
        draggable: true,
        animation: 'AMAP_ANIMATION_DROP'
      });
      map.add(marker);

      function revGeo(lng, lat) {
        selLat = lat; selLng = lng;
        geocoder.getAddress([lng, lat], function (status, result) {
          if (status === 'complete' && result.regeocode) {
            selAddr = result.regeocode.formattedAddress;
            document.getElementById('address-text').innerText = selAddr;
          }
          document.getElementById('coord-text').innerText =
            '纬度: ' + lat.toFixed(6) + '  经度: ' + lng.toFixed(6);
        });
      }

      marker.on('dragend', function (e) { revGeo(e.lnglat.getLng(), e.lnglat.getLat()); });
      map.on('click', function (e) {
        marker.setPosition(e.lnglat);
        revGeo(e.lnglat.getLng(), e.lnglat.getLat());
      });
      revGeo(initLng, initLat);
    }

    function confirmSel() {
      window.parent.postMessage(JSON.stringify({
        type: 'amap_result',
        lat: selLat, lng: selLng, address: selAddr
      }), '*');
    }
  </script>
</body>
</html>
