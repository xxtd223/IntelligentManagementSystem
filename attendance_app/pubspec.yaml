name: attendance_app
description: 智能考勤打卡 APP

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 网络请求
  dio: ^5.4.3
  retrofit: ^4.1.0

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^13.2.1

  # 本地存储
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # GPS 位置
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # 日历组件
  table_calendar: ^3.1.1

  # 日期格式化
  intl: ^0.19.0

  # UI 组件
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # JSON 解析
  json_annotation: ^4.9.0

  # 地图（高德WebView选点）
  webview_flutter: ^4.4.2

  # 图标
  cupertino_icons: ^1.0.6
  webview_flutter_web: ^0.2.3+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
