server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: attendance-system
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:attendance_db}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jwt:
  secret: ${JWT_SECRET:attendance-system-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

qwen:
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: https://dashscope.aliyuncs.com/api/v1
  model: qwen-max
  max-history-turns: 20

logging:
  level:
    org.example.attendance: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
